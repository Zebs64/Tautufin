services:
  tautufin:
    image: ghcr.io/zebs64/tautufin:latest
    restart: unless-stopped
    environment:
      # Fuseau de référence : aligne le monitoring live, les requêtes
      # « localtime » et la conversion des imports horodatés en UTC.
      - TZ=Europe/Paris
    ports:
      - "${DEVSANDBOX_PORT:-8181}:8181"
    volumes:
      # Configuration + base SQLite persistées ici.
      - ./config:/config
      # Optionnel : monter le dossier data de Jellyfin en lecture seule pour
      # importer playback_reporting.db depuis la page Import.
      # - /var/lib/jellyfin/data:/jellyfin-data:ro
